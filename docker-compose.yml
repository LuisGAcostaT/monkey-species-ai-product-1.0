services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: monkey-species-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./models:/app/models
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: monkey-species-frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend
    restart: unless-stopped